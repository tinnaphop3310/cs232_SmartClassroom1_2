<!DOCTYPE html>
<html>
<head>
    <title>Student</title>
    <style>
        body { font-family: Arial; }
        .card {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-submit { background: green; color: white; }
        .btn-disabled { background: gray; color: white; cursor: not-allowed; }
    </style>
</head>
<body>

<h2>🎓 Assignment Submission</h2>
<p id="status"></p>

<div id="list"></div>

<script>
function formatTime(ms) {
    const h = Math.floor(ms / (1000 * 60 * 60));
    const m = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
    return `${h} ชม. ${m} นาที`;
}

function showAssignments() {
    const container = document.getElementById("list");
    container.innerHTML = "";

    let assignments = JSON.parse(localStorage.getItem("assignments")) || [];
    let submissions = JSON.parse(localStorage.getItem("submissions")) || [];

    assignments.forEach(a => {
        const now = new Date();
        const deadline = new Date(a.deadline);
        const submitted = submissions.find(s => s.assignment_id == a.id);

        let status = "";
        let color = "";
        let fileText = "";
        let extra = "";
        let timeLeft = deadline - now;

        if (submitted) {
            status = "✅ Submitted";
            color = "green";
            fileText = `📎 ${submitted.file}`;
            extra = `🕒 ${new Date(submitted.time).toLocaleString()}`;
        } 
        else if (deadline < now && !a.allowLate) {
            status = "❌ Closed";
            color = "red";
        } 
        else if (deadline < now && a.allowLate) {
            status = "⚠️ Late (allowed)";
            color = "orange";
        } 
        else if (timeLeft < 43200000) {
            status = "⏰ Near deadline";
            color = "orange";
            extra = `เหลือเวลา: ${formatTime(timeLeft)}`;
        } 
        else {
            status = "⏳ Not submitted";
            color = "gray";
            extra = `เหลือเวลา: ${formatTime(timeLeft)}`;
        }

        let disabled = "";
        let btnClass = "btn-submit";
        let btnText = "Submit";

        if (submitted && deadline > now) {
            btnText = "Resubmit";
        }

        if (deadline < now && !a.allowLate) {
            disabled = "disabled";
            btnClass = "btn-disabled";
        }

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${a.title}</h3>
            <p>${a.description}</p>
            <p>📅 ${a.deadline}</p>

            <p>Status: <span style="color:${color}"><b>${status}</b></span></p>
            <p>${extra}</p>
            <p>${fileText}</p>

            <input type="file" id="file-${a.id}"><br><br>

            <button class="btn ${btnClass}" ${disabled}
                onclick="submitAssignment(${a.id})">
                ${btnText}
            </button>
        `;

        container.appendChild(div);
    });
}

function submitAssignment(id) {
    let assignments = JSON.parse(localStorage.getItem("assignments")) || [];
    let submissions = JSON.parse(localStorage.getItem("submissions")) || [];

    const assignment = assignments.find(a => a.id == id);
    const fileInput = document.getElementById(`file-${id}`);
    const fileName = fileInput.files[0]?.name;

    if (!fileName) {
        alert("กรุณาเลือกไฟล์");
        return;
    }

    const now = new Date();
    const deadline = new Date(assignment.deadline);

    if (deadline < now && !assignment.allowLate) {
        alert("❌ หมดเวลา");
        return;
    }

    const existing = submissions.find(s => s.assignment_id == id);

    if (existing) {
        existing.file = fileName;
        existing.time = new Date().toISOString();
    } else {
        submissions.push({
            assignment_id: id,
            file: fileName,
            time: new Date().toISOString()
        });
    }

    localStorage.setItem("submissions", JSON.stringify(submissions));

    document.getElementById("status").innerText = "✅ Saved!";
    document.getElementById("status").style.color = "green";

    showAssignments();
}

showAssignments();
</script>

</body>
</html>
